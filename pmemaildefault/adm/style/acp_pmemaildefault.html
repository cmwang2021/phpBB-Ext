<!-- INCLUDE overall_header.html -->

<h1>{L_ACP_PMEMAILDEFAULT_SETTINGS}</h1>

<p>{L_ACP_PMEMAILDEFAULT_EXPLAIN}</p>

<form id="acp_pmemaildefault" method="post" action="{U_ACTION}">
	<fieldset>
		<legend>{L_ACP_PMEMAILDEFAULT_SETTINGS}</legend>
		<dl>
			<dt><label>{L_PMEMAILDEFAULT_MODE}{L_COLON}</label><br /><span>{L_PMEMAILDEFAULT_MODE_EXPLAIN}</span></dt>
			<dd>
				<label><input type="radio" class="radio" name="pmemaildefault_enabled" value="1"<!-- IF PMEMAILDEFAULT_ENABLED --> checked="checked"<!-- ENDIF --> /> {L_PMEMAILDEFAULT_ON}</label>
				<label><input type="radio" class="radio" name="pmemaildefault_enabled" value="0"<!-- IF not PMEMAILDEFAULT_ENABLED --> checked="checked"<!-- ENDIF --> /> {L_PMEMAILDEFAULT_OFF}</label>
			</dd>
		</dl>
	</fieldset>
	<fieldset>
		<legend>{L_ACP_SUBMIT_CHANGES}</legend>
		<p class="submit-buttons">
			<input class="button1" type="submit" id="submit" name="submit" value="{L_SUBMIT}" />&nbsp;
			<input class="button2" type="reset" id="reset" name="reset" value="{L_RESET}" />
		</p>
		{S_FORM_TOKEN}
	</fieldset>
</form>

<!-- INCLUDE overall_footer.html -->
